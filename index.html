<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>たんていメモ（Q1 もうちょうえん）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:#f0eef8;color:#1a1a1a;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:16px}
.app{width:100%;max-width:460px;background:#faf9fc;border-radius:20px;box-shadow:0 8px 40px rgba(80,60,150,.12);overflow:hidden}
.bar{display:flex;align-items:center;gap:8px;padding:14px 16px;background:#6a5ab0;color:#fff}
.bar .ttl{font-size:16px;font-weight:700}
.bar .ph{margin-left:auto;font-size:12px;opacity:.9;background:rgba(255,255,255,.18);padding:3px 9px;border-radius:10px}
.screen{padding:18px 16px;min-height:460px;position:relative}
.footer{padding:0 16px 18px}
.btn{display:block;width:100%;border:none;border-radius:14px;padding:14px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;background:#fff;color:#6a5ab0;border:2px solid #d8d2f0;transition:.12s}
.btn:active{transform:scale(.97)}
.btn.primary{background:#6a5ab0;color:#fff;border-color:#6a5ab0}
.btn+.btn{margin-top:8px}
.lead{font-size:16px;font-weight:700;text-align:center;margin-bottom:6px}
.sub{font-size:13px;color:#777;text-align:center;line-height:1.8;margin-bottom:14px}
/* suspects (organ map + strip) */
.grid5{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.susp{border-radius:12px;padding:12px;text-align:center}
.susp .pin{width:18px;height:18px;border-radius:50%;margin:0 auto 6px}
.susp .nm{font-size:13px;font-weight:700}
.strip{display:flex;gap:5px;margin-bottom:14px}
.chip{flex:1;border-radius:9px;padding:7px 2px;text-align:center;transition:.3s}
.chip .cpin{width:11px;height:11px;border-radius:50%;margin:0 auto 4px}
.chip .cnm{font-size:9.5px;font-weight:700;line-height:1.2}
.chip.ex{filter:grayscale(1);opacity:.32}
.chip.ex .cnm::after{content:"✓";display:block;color:#888}
/* interview */
.qbox{background:#f3f1fa;border-radius:14px;padding:13px 15px;margin-bottom:12px}
.qbox .q{font-size:16px;font-weight:700}
.qbox .a{font-size:13px;color:#999;font-style:italic;margin-top:5px}
.yn{display:flex;gap:8px;margin-bottom:18px}
.yn .btn{font-size:16px;padding:15px}
.barslbl{font-size:11.5px;font-weight:700;color:#888;margin-bottom:8px}
.dxbar{margin-bottom:8px}
.dxbar .row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.dxbar .row .sc{color:#aaa}
.track{height:13px;background:#ece9f5;border-radius:7px;overflow:hidden}
.fill{height:100%;width:0;border-radius:7px;transition:width .4s,opacity .4s}
/* compact meter reused in 聴診/心エコー/CT */
.meter .dxbar{margin-bottom:5px}
.meter .dxbar .row{font-size:11px;margin-bottom:2px}
.meter .track{height:9px;border-radius:5px}
.meter .fill{border-radius:5px}
/* echo / auscultation stages */
.stage-c{display:flex;justify-content:center;margin:14px 0}
.hint{font-size:13px;text-align:center;color:#777;min-height:24px;line-height:1.6}
.belly{width:170px;height:150px}
.wave{display:flex;align-items:flex-end;justify-content:center;gap:4px;height:40px;margin:10px 0}
.wave i{width:6px;background:#6a5ab0;border-radius:3px;animation:eq 1s infinite ease-in-out}
@keyframes eq{0%,100%{height:8px}50%{height:34px}}
/* CT */
.ct-cols{display:flex;gap:8px;align-items:stretch}
.ct-body{width:104px;flex:none;text-align:center}
.ct-body .cap{font-size:9.5px;color:#999;margin-top:4px;line-height:1.3}
.bodywrap{position:relative}
.bodywrap svg,.bodywrap .bodyimg{display:block;width:100%}
.nowline{position:absolute;left:-4px;right:-4px;height:0;border-top:2.5px dashed #D4537E;transition:top .25s}
.nowline span{position:absolute;right:0;top:-15px;font-size:9px;font-weight:700;color:#D4537E;background:#faf9fc;padding:0 3px}
.ct-main{flex:1;min-width:0}
.ctbox{background:#EAE6DD;border-radius:12px;padding:8px 10px 10px}
.stagewrap{position:relative;padding:14px 22px 16px}
.stage{position:relative;background:#F4F1EA;border-radius:8px;overflow:hidden;aspect-ratio:1/1}
.stage svg{display:block;width:100%;height:100%}
.stage img.ct{display:block;width:100%;height:100%;object-fit:contain}
.stage img.ov{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
.dir{position:absolute;font-size:10px;font-weight:700;color:#8A857B}
.dir.t{top:0;left:50%;transform:translateX(-50%)}
.dir.b{bottom:0;left:50%;transform:translateX(-50%)}
.dir.l{left:0;top:50%;transform:translateY(-50%)}
.dir.r{right:0;top:50%;transform:translateY(-50%)}
.glow{position:absolute;width:72px;height:72px;border-radius:50%;transform:translate(-50%,-50%);cursor:pointer;display:none;background:rgba(255,255,160,.45);box-shadow:0 0 0 0 rgba(255,230,90,.7);animation:pulse 1.1s infinite}
.glow.on{display:block}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,225,80,.65);background:rgba(255,255,160,.5)}70%{box-shadow:0 0 0 16px rgba(255,225,80,0);background:rgba(255,255,160,.2)}100%{box-shadow:0 0 0 0 rgba(255,225,80,0);background:rgba(255,255,160,.5)}}
.ctcap{text-align:center;font-size:10px;color:#8A857B;margin-top:2px}
.slr{display:flex;align-items:center;gap:8px;margin-top:8px}
.slr span{font-size:10px;color:#8A857B}
input[type=range]{flex:1;accent-color:#6a5ab0}
.guide{background:#f3f1fa;border-radius:10px;padding:10px 12px;font-size:13px;font-weight:700;color:#5a4ba0;text-align:center;margin-top:10px;line-height:1.6}
/* zoom overlay */
.zoom{position:absolute;inset:0;background:rgba(35,25,60,.86);border-radius:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;z-index:20}
.zoom .zimg{width:180px;height:180px;position:relative;background:#fff;border-radius:16px;overflow:hidden}
.zoom .zimg svg{display:block;width:100%;height:100%}
.zoom .zimg img.ov{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
.zoom .zq{color:#fff;font-size:15px;font-weight:700;text-align:center;margin:16px 0 12px;line-height:1.7}
.zoom .zbtns{display:flex;gap:10px;width:100%;max-width:300px}
.zoom .zbtns .btn{flex:1}
.zmsg{color:#ffd9e3;font-size:12.5px;text-align:center;margin-top:10px;min-height:18px}
/* judge cards */
.cards{display:grid;grid-template-columns:1fr;gap:8px;width:100%;max-width:320px}
.crd{border-radius:12px;padding:11px 12px;text-align:left;cursor:pointer;border:2px solid;display:flex;align-items:center;gap:8px}
.crd:active{transform:scale(.98)}
.crd .ico{font-size:20px}
.crd .cn{font-size:13.5px;font-weight:700}
.crd .cc{font-size:10.5px;margin-top:2px}
/* treat / explain */
.center{text-align:center;padding:8px 0}
.circle{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:32px}
.sentence{background:#f3f1fa;border-radius:14px;padding:16px;font-size:15px;line-height:2.2;margin-bottom:14px}
.blank{display:inline-block;min-width:96px;border-bottom:3px solid #c9bff0;text-align:center;font-weight:700;color:#6a5ab0;padding:0 4px}
.blank.filled{border-bottom-color:#6a5ab0;background:#ece7fb;border-radius:6px}
.opts{margin-bottom:10px}
.opts .ol{font-size:11.5px;font-weight:700;color:#888;margin-bottom:6px}
.optrow{display:flex;gap:8px}
.optrow .btn{flex:1}
.big{font-size:18px;font-weight:700}
.face{font-size:40px;text-align:center;margin:6px 0}
.surg{font-size:15px;font-weight:700;text-align:center;color:#5a4ba0;min-height:26px;line-height:1.7}
.note{font-size:12px;color:#999;text-align:center;margin-top:8px;line-height:1.6}
</style>
</head>
<body>
<div class="app">
  <div class="bar"><span>🔍</span><span class="ttl">たんていメモ</span><span class="ph" id="ph"></span></div>
  <div class="screen" id="screen"></div>
  <div class="footer" id="footer"></div>
</div>

<script>
/* ============ data dictionaries (§2 spec) ============ */
var DX=[
  {k:"m",n:"もうちょうえん",c:"#D4537E",lc:"#FBEAF0",tc:"#993556"},
  {k:"i",n:"いちょうえん",c:"#EF9F27",lc:"#FAEEDA",tc:"#854F0B"},
  {k:"u",n:"にょうろけっせき",c:"#378ADD",lc:"#E6F1FB",tc:"#185FA5"},
  {k:"t",n:"たんせき",c:"#97C459",lc:"#EAF3DE",tc:"#3B6D11"},
  {k:"h",n:"しんきんこうそく",c:"#E24B4A",lc:"#FCEBEB",tc:"#A32D2D"}
];
/* ROS 8 questions (§4 spec, scores normalized by /8) */
var Q=[
  {q:"ねつ は ありますか？",a:"うん、ちょっと あついかも",w:{m:1,i:1,t:1}},
  {q:"はきけ は ありますか？",a:"きもちわるい…",w:{m:1,i:1,u:1,t:1,h:1}},
  {q:"げり は ありますか？",a:"ううん、ないよ",w:{i:3}},
  {q:"みぎ下 の おなかが いたい？",a:"ここ！ みぎ下が いたい",w:{m:3,i:1}},
  {q:"みぎ上 の おなかは いたい？",a:"みぎ上は いたくない",w:{t:3}},
  {q:"むね は いたいですか？",a:"むねは へいきだよ",w:{h:3}},
  {q:"こし・せなか は いたい？",a:"こしも だいじょうぶ",w:{u:3}},
  {q:"いたみは おへそ→みぎ下に うごいた？",a:"さいしょ おへそ、いまは みぎ下…",w:{m:3}}
];

/* ============ global state ============ */
var ans={},scores={m:0,i:0,u:0,t:0,h:0},qi=0;
var excluded={};      /* suspects ruled out: i(聴診) h(エコー) t/u(CT) */
var explain={dx:null,tx:null}; /* fill-in-the-blank answers */
var SC=document.getElementById('screen'),FT=document.getElementById('footer'),PH=document.getElementById('ph');

function dxById(k){return DX.filter(function(d){return d.k===k;})[0];}
function recompute(){scores={m:0,i:0,u:0,t:0,h:0};Q.forEach(function(it){if(ans[it.q]==='yes')for(var k in it.w)scores[k]+=it.w[k];});}
function topKey(){var t='',mx=-1;for(var k in scores){if(!excluded[k]&&scores[k]>mx){mx=scores[k];t=k;}}return mx>0?t:'';}
function mkbtn(label,fn,primary){var b=document.createElement('button');b.className='btn'+(primary?' primary':'');b.textContent=label;b.onclick=fn;return b;}
function resetAll(){ans={};scores={m:0,i:0,u:0,t:0,h:0};qi=0;excluded={};explain={dx:null,tx:null};}

/* 疾患らしさメーター: the diagnosis bars, reused across steps 2-5.
   Excluded diseases gray out but keep a faint trace; the leading
   non-excluded disease is highlighted, so 5→1 narrowing is visible. */
function meterBars(){
  var top=topKey();
  return DX.map(function(d){
    var ex=!!excluded[d.k];
    var w=Math.round(scores[d.k]/8*100);
    var op=ex?.4:(d.k===top&&scores[d.k]>0?1:(scores[d.k]>0?.55:.18));
    return '<div class="dxbar"><div class="row"><span'+(ex?' style="text-decoration:line-through;color:#bbb"':'')+'>'+d.n+'</span><span class="sc">'+(ex?'じょがい':scores[d.k])+'</span></div>'
      +'<div class="track"><div class="fill" style="width:'+w+'%;background:'+d.c+';opacity:'+op+(ex?';filter:grayscale(1)':'')+'"></div></div></div>';
  }).join('');
}
function meter(label){return '<div class="barslbl">'+(label||'しっかんらしさメーター')+'</div><div class="meter" id="meterbars">'+meterBars()+'</div>';}
function refreshMeter(){var m=document.getElementById('meterbars');if(m)m.innerHTML=meterBars();}

/* ============ image-with-fallback helper ============
   We always render an SVG drawing as the base, then overlay a PNG
   (src) on top. If the PNG is missing the overlay removes itself,
   so every screen works without images and upgrades when images
   are dropped into /img. (受け入れ基準: 画像なしでも動く) */
function overlay(src){return '<img class="ov" src="'+src+'" onerror="this.remove()">';}

/* img with SVG fallback: shows the PNG; if missing, swaps to the SVG
   drawing. Used for CT slices & the body figure (square 1:1 images). */
var FBSTORE={},FBID=0;
function imgFB(src,svgFb,cls){
  var id='fb'+(FBID++);FBSTORE[id]=svgFb;
  return '<img class="'+cls+'" src="'+src+'" onerror="this.outerHTML=window.FBSTORE[\''+id+'\']">';
}

/* ============ STEP 1: organ map ============ */
function map(){
  PH.textContent="1 / 6";
  SC.innerHTML='<p class="lead">かんじゃさんが きました！</p>'
    +'<p class="sub">「おなかが いたいんです…」<br>からだの中の だれかが わるさをしてる。さがそう！</p>'
    +'<div class="grid5">'
    +DX.map(function(d){return '<div class="susp" style="background:'+d.lc+'"><div class="pin" style="background:'+d.c+'"></div><span class="nm" style="color:'+d.tc+'">'+d.n+'</span></div>';}).join('')
    +'<div style="display:flex;align-items:center;justify-content:center;font-size:12px;color:#aaa;text-align:center">5人の<br>ようぎしゃ</div></div>';
  FT.innerHTML="";FT.appendChild(mkbtn("たんていスタート！",function(){qi=0;interview();},true));
}

/* ============ STEP 2: interview (ROS bars) ============ */
function interview(){
  PH.textContent="2 / 6 ・ 問診";
  var it=Q[qi],top=topKey();
  var bars=DX.map(function(d){
    var w=Math.round(scores[d.k]/8*100);            /* normalize by /8 */
    var op=(scores[d.k]>0&&d.k===top)?1:(scores[d.k]>0?.55:.18); /* top is bold */
    return '<div class="dxbar"><div class="row"><span>'+d.n+'</span><span class="sc">'+scores[d.k]+'</span></div><div class="track"><div class="fill" style="width:'+w+'%;background:'+d.c+';opacity:'+op+'"></div></div></div>';
  }).join('');
  SC.innerHTML='<div class="qbox"><div class="q">'+it.q+'</div><div class="a">かんじゃ：'+it.a+'</div></div>'
    +'<div class="yn"><button class="btn" id="by">あり</button><button class="btn" id="bn">なし</button></div>'
    +'<div class="barslbl">あやしい びょうき（'+(qi+1)+' / '+Q.length+'）</div>'+bars;
  FT.innerHTML="";
  document.getElementById('by').onclick=function(){pick('yes');};
  document.getElementById('bn').onclick=function(){pick('no');};
}
function pick(v){ans[Q[qi].q]=v;recompute();if(qi<Q.length-1){qi++;interview();}else{auscult();}}

/* ============ STEP 3: auscultation (rule out 胃腸炎) ============ */
function bellySVG(){
  return '<svg class="belly" viewBox="0 0 170 150"><ellipse cx="85" cy="80" rx="62" ry="55" fill="#F4D9C0" stroke="#E3C0A2" stroke-width="2"/><circle cx="85" cy="80" r="6" fill="#E3C0A2"/>'
    +'<circle cx="118" cy="74" r="16" fill="#cfd6e0" stroke="#9aa6b8" stroke-width="3"/><line x1="118" y1="58" x2="118" y2="36" stroke="#9aa6b8" stroke-width="3"/></svg>';
}
function auscult(){
  PH.textContent="3 / 6 ・ 聴診";
  SC.innerHTML='<p class="sub">おなかに <b>ちょうしんき</b> を あてて、<br>ちょうの音を きいてみよう</p>'
    +'<div class="stage-c">'+bellySVG()+'</div>'
    +'<div class="wave">'+[0,.2,.4,.1,.5,.3,.15,.45,.25].map(function(d){return '<i style="animation-delay:'+d+'s"></i>';}).join('')+'</div>'
    +'<p class="hint" id="ah">せんせい：いまの音、ふつうかな？ うるさい？</p>'
    +meter();
  FT.innerHTML="";
  var bA=mkbtn("うるさい",function(){
    document.getElementById('ah').innerHTML="せんせい：これは <b>ふつうの音</b>だよ。うるさく ないね 🙂";
  });
  var bB=mkbtn("うるさくない",function(){
    scores.i=1;excluded.i=true;                  /* faint bar remains, ruled out */
    document.getElementById('ah').innerHTML="せんせい：そう、ふつうの音だね<br>→ <b>いちょうえん は ちがう！</b>";
    refreshMeter();
    FT.innerHTML="";FT.appendChild(mkbtn("つぎへ（心エコー）",function(){echo();},true));
  },true);
  FT.appendChild(bA);FT.appendChild(bB);
}

/* ============ STEP 4: echo (rule out 心筋梗塞) ============ */
function echo(){
  PH.textContent="4 / 6 ・ 心エコー";
  SC.innerHTML='<p class="sub">むねは いたくないけど、ねんのため<br><b>心ぞう</b>を 見てみよう</p>'
    +'<div class="stage-c"><svg width="170" height="170" viewBox="0 0 160 160"><circle cx="80" cy="80" r="66" fill="#1a1a1a"/><path id="hh" d="M80 60 q-15 -17 -30 -2 q-13 15 0 32 q11 15 30 28 q19 -13 30 -28 q13 -17 0 -32 q-15 -15 -30 2z" fill="#E24B4A"/><text x="80" y="150" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888">ドクン、ドクン…</text></svg></div>'
    +'<p class="hint" id="eh">エコーを 当ててみよう</p>'
    +meter();
  var h=document.getElementById('hh'),beat=0;
  var iv=setInterval(function(){beat++;var s=beat%2?1.13:1;h.setAttribute('transform','translate(80 80) scale('+s+') translate(-80 -80)');},460);
  FT.innerHTML="";
  FT.appendChild(mkbtn("心ぞうを 見た！",function(){
    clearInterval(iv);scores.h=0;excluded.h=true;
    document.getElementById('eh').innerHTML="心ぞうは <b>元気に動いてる</b> → だいじょうぶ！";
    refreshMeter();
    FT.innerHTML="";FT.appendChild(mkbtn("つぎへ（CTけんさ）",function(){ct();},true));
  },true));
}

/* ============ STEP 5: CT (main act) ============ */
/* SVG fallback drawings for the 8 axial slices.
   image left = patient's right (みぎ). top = belly, bottom = back. */
function slice(i){
  function body(inner){
    return '<svg viewBox="0 0 300 240"><ellipse cx="150" cy="115" rx="124" ry="80" fill="#EAE6DD" stroke="#C9C3B5" stroke-width="2"/>'
      +'<ellipse cx="150" cy="188" rx="17" ry="14" fill="#F4F1EA" stroke="#C9C3B5" stroke-width="2"/>'  /* spine bottom-center */
      +inner+'</svg>';
  }
  var liver='<path d="M40 70 q70 -18 100 6 q4 40 -30 56 q-55 10 -72 -18 q-8 -28 2 -44z" fill="#EFB44E"/>';
  var gall='<ellipse cx="118" cy="98" rx="13" ry="17" fill="#97C459"/>';
  var stom='<ellipse cx="200" cy="92" rx="40" ry="26" fill="#7FB0E0"/>';
  var lungL='<ellipse cx="78" cy="78" rx="34" ry="40" fill="#A9B4C2"/>';
  var lungR='<ellipse cx="222" cy="78" rx="34" ry="40" fill="#A9B4C2"/>';
  var heart='<path d="M165 70 q-13 -15 -26 -2 q-11 13 0 28 q9 13 26 24 q17 -11 26 -24 q11 -15 0 -28 q-13 -13 -26 2z" fill="#E24B4A"/>';
  function kidney(x){return '<ellipse cx="'+x+'" cy="150" rx="20" ry="13" fill="#5DA0E0"/>';}
  function ureter(x){return '<circle cx="'+x+'" cy="150" r="5" fill="#5DA0E0" stroke="#fff" stroke-width="1.5"/>';}
  var bowel='<circle cx="120" cy="120" r="15" fill="none" stroke="#E0A0B6" stroke-width="7"/><circle cx="165" cy="128" r="14" fill="none" stroke="#E0A0B6" stroke-width="7"/><circle cx="150" cy="98" r="13" fill="none" stroke="#E0A0B6" stroke-width="7"/><circle cx="185" cy="150" r="12" fill="none" stroke="#E0A0B6" stroke-width="7"/>';
  var appInf='<ellipse cx="95" cy="150" rx="34" ry="30" fill="#fff" opacity=".5"/><path d="M82 122 q26 8 20 44" fill="none" stroke="#E24B4A" stroke-width="16" stroke-linecap="round"/>';
  var bladder='<ellipse cx="150" cy="135" rx="32" ry="24" fill="#5DA0E0"/>';
  var S=[
    body(lungL+lungR+heart),                          /* 0 lungs+heart */
    body(liver+'<ellipse cx="78" cy="58" rx="18" ry="12" fill="#A9B4C2"/>'), /* 1 liver top */
    body(liver+gall+stom),                            /* 2 liver+gall+stomach */
    body(stom+'<path d="M40 90 q40 -8 60 8 q-6 26 -40 22 q-26 -6 -20 -30z" fill="#EFB44E"/>'+kidney(90)+kidney(210)), /* 3 stomach+kidney */
    body(bowel+kidney(86)+kidney(214)+ureter(108)+ureter(192)), /* 4 kidney+ureter+bowel */
    body(bowel+ureter(110)+ureter(190)),              /* 5 bowel+ureter */
    body(bowel+appInf),                               /* 6 appendix INFLAMED */
    body(bladder+'<circle cx="100" cy="120" r="11" fill="none" stroke="#E0A0B6" stroke-width="6"/><circle cx="200" cy="120" r="11" fill="none" stroke="#E0A0B6" stroke-width="6"/>') /* 7 bladder */
  ];
  return S[i];
}
function bodyFigure(){
  var svg='<svg viewBox="0 0 90 200"><ellipse cx="45" cy="22" rx="15" ry="16" fill="#F4D9C0"/>'
    +'<rect x="24" y="36" width="42" height="92" rx="20" fill="#F4D9C0"/>'
    +'<rect x="10" y="44" width="12" height="60" rx="6" fill="#F4D9C0"/><rect x="68" y="44" width="12" height="60" rx="6" fill="#F4D9C0"/>'
    +'<rect x="28" y="120" width="14" height="68" rx="7" fill="#F4D9C0"/><rect x="48" y="120" width="14" height="68" rx="7" fill="#F4D9C0"/>'
    +'<ellipse cx="36" cy="60" rx="9" ry="12" fill="#EFB44E" opacity=".85"/><ellipse cx="40" cy="74" rx="11" ry="8" fill="#7FB0E0" opacity=".8"/>'
    +'<ellipse cx="33" cy="100" rx="9" ry="9" fill="#E0A0B6" opacity=".85"/><ellipse cx="52" cy="100" rx="9" ry="9" fill="#E0A0B6" opacity=".85"/>'
    +'<path d="M30 108 q4 9 0 16" fill="none" stroke="#E24B4A" stroke-width="4" stroke-linecap="round"/></svg>';
  return imgFB('img/figure_body.png',svg,'bodyimg');
}
/* CT slice filenames (§9). Each shows the PNG, falling back to slice()'s SVG. */
var CTFILES=['ct_01_lungs_heart','ct_02_liver_top','ct_03_liver_gall_stomach','ct_04_stomach_kidney','ct_05_kidney_ureter_bowel','ct_06_bowel_ureter','ct_07_appendix_INFLAMED','ct_08_bladder'];
function ctImg(v){return imgFB('img/'+CTFILES[v]+'.png',slice(v),'ct');}

var ctIdx=0, ctPhase='gall';                 /* gall → ureter → appendix → done */
var CTTARGET={gall:2,ureter:4,appendix:6};   /* slice idx where each organ shows */
var CTGLOW={gall:{l:61,t:43},ureter:{l:24,t:66},appendix:{l:24,t:67}}; /* % position over stage (tuned to PNG organs) */
var CTGUIDE={
  gall:"つぎは <b>たんのう</b>（みぎ上のみどり）。<br>スライダーを うごかして、光ったら タップ！",
  ureter:"つぎは <b>おしっこの道</b>。<br>光ったら タップして しらべよう",
  appendix:"のこりは <b>みぎ下</b>！ なにか いる…？<br>光ったら タップ！",
  done:"みぎ下に なにか みつけた！ → どれ？"
};

function ct(){
  PH.textContent="5 / 6 ・ CT";ctIdx=0;ctPhase='gall';
  SC.innerHTML=meter()
    +'<div class="ct-cols"><div class="ct-body"><div class="bodywrap">'+bodyFigure()+'<div class="nowline" id="nowline"><span>いまここ</span></div></div><div class="cap">下から<br>見上げてるよ！</div></div>'
    +'<div class="ct-main"><div class="ctbox"><div class="stagewrap"><div class="stage" id="stage">'+ctImg(0)+'<div class="glow" id="glow"></div></div>'
    +'<span class="dir t">おなかがわ</span><span class="dir b">せなかがわ</span><span class="dir l">みぎ</span><span class="dir r">ひだり</span></div>'
    +'<div class="ctcap">あしのほうから 見上げた 輪切り</div>'
    +'<div class="slr"><span>あたま</span><input type="range" id="dp" min="0" max="7" value="0" step="1"><span>あし</span></div></div></div></div>'
    +'<div class="guide" id="guide">'+CTGUIDE.gall+'</div>';
  document.getElementById('dp').oninput=function(){setSlice(+this.value);};
  document.getElementById('glow').onclick=function(){openZoom(ctPhase);};
  setSlice(0);
  FT.innerHTML="";
  /* intro: show the "stone" sample once before searching */
  introStone();
}
function setSlice(v){
  ctIdx=v;
  document.getElementById('stage').innerHTML=ctImg(v)+'<div class="glow" id="glow"></div>';
  document.getElementById('glow').onclick=function(){openZoom(ctPhase);};
  /* move the "いまここ" line down the torso (0=chest..7=pelvis) */
  document.getElementById('nowline').style.top=(33+v/7*33)+'%';
  refreshGlow();
}
function refreshGlow(){
  var g=document.getElementById('glow');if(!g)return;
  if(ctPhase!=='done'&&ctPhase!=='appendixSeen'&&CTTARGET[ctPhase]===ctIdx){
    var p=CTGLOW[ctPhase];g.style.left=p.l+'%';g.style.top=p.t+'%';g.classList.add('on');
  }else g.classList.remove('on');
}
function setGuide(t){document.getElementById('guide').innerHTML=t;}

/* zoom overlay: stone intro + organ close-ups */
function zoomShell(svgFb,src,q,inner){
  var z=document.createElement('div');z.className='zoom';z.id='zoom';
  z.innerHTML='<div class="zimg">'+imgFB(src,svgFb,'ov')+'</div><div class="zq">'+q+'</div>'+inner+'<div class="zmsg" id="zmsg"></div>';
  SC.appendChild(z);return z;
}
function closeZoom(){var z=document.getElementById('zoom');if(z)z.remove();}

function introStone(){
  var fb='<svg viewBox="0 0 100 100"><ellipse cx="50" cy="52" rx="30" ry="36" fill="#97C459"/><circle cx="50" cy="55" r="9" fill="#fff"/><circle cx="44" cy="48" r="4" fill="#fff"/></svg>';
  var z=zoomShell(fb,'img/zoom_gall_stone.png','これが「石」だよ。<br>白い ツブツブを さがそう！','<div class="zbtns"><button class="btn primary" style="flex:1" id="zk">わかった！</button></div>');
  document.getElementById('zk').onclick=function(){closeZoom();setGuide(CTGUIDE.gall);refreshGlow();};
}
function openZoom(phase){
  if(phase==='gall'){
    var fb='<svg viewBox="0 0 100 100"><ellipse cx="50" cy="52" rx="30" ry="36" fill="#97C459"/></svg>';
    zoomShell(fb,'img/zoom_gall_normal.png','たんのうに 白い石、ある？ ない？',
      '<div class="zbtns"><button class="btn" id="za">ある</button><button class="btn primary" id="zn">ない</button></div>');
    document.getElementById('za').onclick=function(){document.getElementById('zmsg').textContent="うーん、よーく見て。白い石は ないみたい。もう一回！";};
    document.getElementById('zn').onclick=function(){excluded.t=true;refreshMeter();closeZoom();ctPhase='ureter';setGuide("せいかい！ <b>たんせき じゃない！</b><br>"+CTGUIDE.ureter);refreshGlow();};
  }else if(phase==='ureter'){
    var fb2='<svg viewBox="0 0 100 100"><rect x="42" y="18" width="16" height="64" rx="8" fill="#5DA0E0"/></svg>';
    zoomShell(fb2,'img/zoom_ureter_normal.png','おしっこの道に 白い石、ある？ ない？',
      '<div class="zbtns"><button class="btn" id="za">ある</button><button class="btn primary" id="zn">ない</button></div>');
    document.getElementById('za').onclick=function(){document.getElementById('zmsg').textContent="道は きれい。白い石は ないみたい。もう一回！";};
    document.getElementById('zn').onclick=function(){excluded.u=true;refreshMeter();closeZoom();ctPhase='appendix';setGuide("せいかい！ <b>にょうろけっせき じゃない！</b><br>"+CTGUIDE.appendix);refreshGlow();};
  }else if(phase==='appendix'){
    var fb3='<svg viewBox="0 0 100 100"><ellipse cx="50" cy="52" rx="38" ry="34" fill="#fff" opacity=".6"/><path d="M34 30 q30 8 24 50" fill="none" stroke="#E24B4A" stroke-width="18" stroke-linecap="round"/></svg>';
    zoomShell(fb3,'img/zoom_appendix_inflamed.png','ソーセージみたいに はれて、<br>まわりが 白い！ これは…？',
      '<div class="cards" id="jcards"></div>');
    var judge=[dxById('m'),dxById('t'),dxById('u')];
    var crit={m:"みぎ下の ソーセージ＋白いもや",t:"みぎ上の 袋に 白い石",u:"道に 白い石"};
    var ico={m:"🩷",t:"💚",u:"💙"};
    document.getElementById('jcards').innerHTML=judge.map(function(d){
      return '<div class="crd" data-k="'+d.k+'" style="background:'+d.lc+';border-color:'+d.c+'"><span class="ico">'+ico[d.k]+'</span><div><div class="cn" style="color:'+d.tc+'">'+d.n+'</div><div class="cc" style="color:'+d.tc+'">'+crit[d.k]+'</div></div></div>';
    }).join('');
    Array.prototype.forEach.call(document.querySelectorAll('#jcards .crd'),function(el){
      el.onclick=function(){
        if(el.dataset.k==='m'){ctPhase='done';closeZoom();treat();}
        else document.getElementById('zmsg').textContent=(el.dataset.k==='t'?"たんせきは みぎ上の 石。これは みぎ下だよ":"にょうろは 道の 石。これは みぎ下の ソーセージだよ")+"。もう一回！";
      };
    });
  }
}

/* ============ STEP 6: explain → surgery → thanks ============ */
function treat(){
  PH.textContent="6 / 6 ・ せつめい";
  renderExplain();
}
function blank(val,ph){return '<span class="blank'+(val?' filled':'')+'">'+(val||ph)+'</span>';}
function renderExplain(){
  SC.innerHTML='<p class="sub">かんじゃさんに せつめい しよう！<br>2つの あなを うめてね</p>'
    +'<div class="sentence">けんさを して、'+blank(explain.dx,'？？？')+' と わかりました。<br>ちりょうは '+blank(explain.tx,'？？？')+' です。</div>'
    +'<div class="opts"><div class="ol">びょうきは？</div><div class="optrow"><button class="btn" id="dx_m">もうちょうえん</button><button class="btn" id="dx_t">たんせき</button></div></div>'
    +'<div class="opts"><div class="ol">ちりょうは？</div><div class="optrow"><button class="btn" id="tx_s">しゅじゅつ</button><button class="btn" id="tx_k">くすり</button></div></div>'
    +'<p class="hint" id="xh"></p>';
  document.getElementById('dx_m').onclick=function(){explain.dx="もうちょうえん";renderExplain();checkExplain();};
  document.getElementById('dx_t').onclick=function(){gentle("xh","たんせきは みぎ上の 石。今回は みぎ下の はれだよ");};
  document.getElementById('tx_s').onclick=function(){explain.tx="しゅじゅつ";renderExplain();checkExplain();};
  document.getElementById('tx_k').onclick=function(){gentle("xh","はれた ちゅうすいは、とらないと なおらないよ");};
  checkExplain();
}
function gentle(id,msg){var e=document.getElementById(id);if(e)e.textContent="せんせい："+msg;}
function checkExplain(){
  FT.innerHTML="";
  if(explain.dx==="もうちょうえん"&&explain.tx==="しゅじゅつ"){
    FT.appendChild(mkbtn("かんじゃさんに つたえる",function(){explainScene();},true));
  }
}
function explainScene(){
  SC.innerHTML='<div class="sentence" style="text-align:center">けんさを して、<b style="color:#993556">もうちょうえん</b> と わかりました。<br>ちりょうは <b style="color:#993556">しゅじゅつ</b> です。</div>'
    +'<div class="face">😊</div><p class="sub">かんじゃさん：「わかりました。<br>おねがいします！」</p>';
  FT.innerHTML="";FT.appendChild(mkbtn("しゅじゅつ スタート",function(){surgery();},true));
}
function surgery(){
  SC.innerHTML='<div class="center"><div class="circle" style="background:#FBEAF0">🏥</div><p class="surg" id="sg">しゅじゅつ中…</p></div>';
  FT.innerHTML="";
  var sg=document.getElementById('sg'),steps=["しゅじゅつ中…","はれた ちゅうすいを とっています…","せいこう！ 🎉"],n=0;
  var iv=setInterval(function(){n++;if(n<steps.length){sg.textContent=steps[n];}if(n>=steps.length-1){clearInterval(iv);FT.innerHTML="";FT.appendChild(mkbtn("つぎへ",function(){thanks();},true));}},1300);
}
function thanks(){
  SC.innerHTML='<div class="center"><div class="face">😄</div><p class="big" style="color:#993556">ありがとう！</p><p class="sub" style="margin-top:8px">おなかの いたいの、すっかり なおったよ。<br>先生の おかげ！</p></div>';
  FT.innerHTML="";FT.appendChild(mkbtn("じけん かいけつ！",function(){done();},true));
}
function done(){
  PH.textContent="かいけつ";
  SC.innerHTML='<div class="center" style="padding:26px 0"><div style="font-size:50px">🏅</div><p class="big" style="margin:12px 0 6px">じけん かいけつ！</p><p class="sub">きみは りっぱな 研修医だ。<br>「もうちょうえん」を 見つけ出した！</p>'+meter("さいごの メーター")+'</div>';
  FT.innerHTML="";FT.appendChild(mkbtn("もう一回 あそぶ",function(){resetAll();map();}));
}

/* boot */
map();
</script>
</body>
</html>
